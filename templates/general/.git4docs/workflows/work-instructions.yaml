# .git4docs/workflows/work-instructions.yaml
name: Work Instruction Review
description: "Work instructions require supervisor review and manager approval"
applies_to:
  category: WI

steps:
  - match:
      relationship: submitter.reports_to
    action: review
    required: true
    description: "Submitter's supervisor reviews the change"

  - role: approver
    action: approve
    required: true
    description: "Manager gives final approval"

on_approve:
  notify:
    - role: viewer
  training_acknowledgment_required: true
  effective_date: immediate
